name: Build Android App

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - run: npm install --legacy-peer-deps  
      - run: |
          mkdir -p www
          cp index.html manifest.json icon-192.png icon-512.png azan.mp3 sw.js www/
      - run: npx cap add android
      - name: Remove default adaptive icon (so our custom PNG icon isn't overridden)
        run: rm -rf android/app/src/main/res/mipmap-anydpi-v26
      - name: Apply custom app icon
        run: |
          cp mipmap-mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp mipmap-mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp mipmap-hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp mipmap-hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp mipmap-xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp mipmap-xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp mipmap-xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp mipmap-xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp mipmap-xxxhdpi.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp mipmap-xxxhdpi.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
      - name: Grant exact-alarm & notification permissions for reliable background azan
        run: |
          python3 -c "
          p = 'android/app/src/main/AndroidManifest.xml'
          c = open(p).read()
          perms = '<uses-permission android:name=\"android.permission.SCHEDULE_EXACT_ALARM\"/>\n<uses-permission android:name=\"android.permission.USE_EXACT_ALARM\"/>\n<uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\"/>\n<uses-permission android:name=\"android.permission.RECEIVE_BOOT_COMPLETED\"/>\n'
          c = c.replace('<application', perms + '<application', 1)
          open(p,'w').write(c)
          "
      - run: npx cap sync android
      - run: |
          mkdir -p android/app/src/main/res/raw
          cp azan.mp3 android/app/src/main/res/raw/azan.mp3
      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: deen-daily-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
